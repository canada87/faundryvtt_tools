name: Release Module

on:
  push:
    branches:
      - main
    paths:
      - 'module.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' module.json)" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Update download URL in module.json
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          jq --arg url "https://github.com/canada87/faundryvtt_tools/releases/download/v${VERSION}/module.zip" \
            '.download = $url' module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Create module zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          zip -r module.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.zip"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            module.json
            module.zip
